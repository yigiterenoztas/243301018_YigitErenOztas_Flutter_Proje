name: konaklama_rezervasyon_sistemi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  provider: ^6.1.5
  go_router: ^17.2.3
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_native_splash:
  color: "#0B2E2E"
  color_dark: "#0B2E2E"
  image: assets/konakla_logo.png
  android_12:
    color: "#0B2E2E"
    color_dark: "#0B2E2E"
    image: assets/konakla_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/ikon4.png
  adaptive_icon_background: "#0B2E2E"
  adaptive_icon_foreground: assets/ikon4.png
  
  
  